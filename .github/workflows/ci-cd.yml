name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  COMPOSE_PROJECT_NAME: rms-ci

jobs:
  backend-check:
    name: Backend lint & import
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back-end
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: back-end/cicd/requirements/requirements.txt

      - name: Install dependencies
        run: pip install -r cicd/requirements/requirements.txt

      - name: Verify app imports
        run: |
          export PYTHONPATH="${GITHUB_WORKSPACE}/back-end"
          python -c "from app.src.app import app; print('FastAPI app OK:', app.title)"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: font-end
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: font-end/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Prepare product.env for CI
        run: cp deploy/product.env.example deploy/product.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production images
        working-directory: deploy
        run: |
          docker compose --env-file product.env build api nginx

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/resource-management' }}
            git pull origin main || git pull origin master
            chmod +x deploy/deploy.sh deploy.sh
            ./deploy/deploy.sh

      - name: Skip deploy (no SSH secrets)
        if: ${{ secrets.DEPLOY_HOST == '' || secrets.DEPLOY_SSH_KEY == '' }}
        run: |
          echo "Build passed. Configure GitHub secrets to auto-deploy:"
          echo "  DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH (optional)"
