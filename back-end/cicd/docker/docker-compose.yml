networks:
  resource-management:
    driver: bridge

volumes:
  db:
  minio_data:

services:
  db:
    image: postgres:13
    container_name: resource-management-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: resource_db
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - 5432:5432
    networks:
      - resource-management
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: resource-management-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - resource-management
    restart: unless-stopped

  api:
    build:
      context: ../../
      dockerfile: cicd/docker/Dockerfile
      target: server_run
    image: resourcemanagement:latest
    container_name: resource-management-api
    ports:
      - 30111:30111
    networks:
      - resource-management
    depends_on:
      - db
      - minio
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      ENV_FILE: /app/.env
      # Hostnames inside Docker network (override local IP in .env)
      HOST_DB: db
      AWS_HOST: http://minio:9000
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: resource-management-adminer
    ports:
      - 8085:8080
    networks:
      - resource-management
    depends_on:
      - db
    restart: unless-stopped
