networks:
  resource-management:
    driver: bridge

volumes:
  db:
  minio_data:
  frontend_node_modules:

services:
  db:
    image: postgres:13
    container_name: resource-management-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: resource_db
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - 5432:5432
    networks:
      - resource-management
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: resource-management-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - resource-management
    restart: unless-stopped

  api:
    build:
      context: ../../
      dockerfile: cicd/docker/Dockerfile
      target: server_run
    image: resourcemanagement:latest
    container_name: resource-management-api
    ports:
      - 30111:30111
    networks:
      - resource-management
    depends_on:
      - db
      - minio
    env_file:
      - ../../.env
    volumes:
      - ../../.env:/app/.env:ro
    environment:
      ENV_FILE: /app/.env
      # Override .env — khớp credential service db/minio trong compose dev
      HOST_DB: db
      NAME_DB: resource_db
      USERNAME_DB: admin
      PASSWORD_DB: "123456"
      AWS_HOST: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_BUCKET_NAME: resource-management
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: resource-management-frontend
    working_dir: /app
    volumes:
      - ../../../font-end:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:30111
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - api
    networks:
      - resource-management
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: resource-management-adminer
    ports:
      - 8085:8080
    networks:
      - resource-management
    depends_on:
      - db
    restart: unless-stopped
